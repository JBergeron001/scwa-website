  .slide-counter {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    font-family: monospace;

    overflow: hidden;

    padding: 0.6rem 1rem;

    border: none;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;

  .loading-screen {
    display: flex; align-items: center; justify-content: center;

  @media (max-width: 768px) {

    .slide-content { padding: 1.5rem; }
    .slide-title { font-size: 1.4rem; }

</style>

let userId = null;
let certNumber = null;
let currentModuleIndex = 0;

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;

  const params = new URLSearchParams(window.location.search);
  certNumber = parseInt(params.get('cert')) || 1;
  const moduleParam = parseInt(params.get('module')) || null;

  document.getElementById('viewerTitle').textContent = CERT_TITLES[certNumber];

  // Check enrollment
  const { data: enrollment } = await sb.from('cert_enrollments')
    .select('*').eq('user_id', userId).eq('cert_number', certNumber).single();

  if (!enrollment) { window.location.href = 'dashboard.html'; return; }

  // Load module progress
  const { data: mp } = await sb.from('module_progress')
    .select('*').eq('user_id', userId).eq('cert_number', certNumber);
  moduleProgressData = mp || [];

  // Load course data (sample for now — will load from JSON files)
  courseData = SAMPLE_COURSES[certNumber] || SAMPLE_COURSES[1];

  // Determine starting position
  if (moduleParam !== null) {
    currentModuleIndex = moduleParam - 1;
    currentSlideIndex = 0;
  } else {
    // Resume from saved position
    const savedModule = moduleProgressData.find(m => m.status === 'in_progress');
    if (savedModule) {
      currentModuleIndex = savedModule.module_number - 1;
      currentSlideIndex = savedModule.current_slide || 0;
    } else {
      // Find first incomplete module
      let found = false;
      for (let i = 0; i < courseData.modules.length; i++) {
        const mp = moduleProgressData.find(m => m.module_number === i + 1);
        if (!mp || !mp.quiz_passed) { currentModuleIndex = i; found = true; break; }
      }
      if (!found) currentModuleIndex = 0;
      currentSlideIndex = 0;
    }
  }

  buildSidebar();
  renderSlide();

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('viewerContent').style.display = 'flex';
}

// ── SIDEBAR ──────────────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  courseData.modules.forEach((mod, i) => {
    const mp = moduleProgressData.find(m => m.module_number === i + 1);
    const isDone = mp?.quiz_passed;
    const isActive = i === currentModuleIndex;
    const isLocked = !isDone && i > 0 && !moduleProgressData.find(m => m.module_number === i && m.quiz_passed);

    const label = document.createElement('div');
    label.className = 'sidebar-section-title';
    label.textContent = `Module ${i + 1}`;
    sidebar.appendChild(label);

    const btn = document.createElement('button');
    btn.className = `module-btn${isActive ? ' active' : ''}${isDone ? ' completed' : ''}`;
    btn.innerHTML = `<div class="module-status ${isDone ? 'status-done' : isActive ? 'status-active' : 'status-locked'}"></div>${mod.title}`;

    if (!isLocked || isDone) {
      btn.onclick = () => { currentModuleIndex = i; currentSlideIndex = 0; buildSidebar(); renderSlide(); };
    } else {
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    }

    sidebar.appendChild(btn);
  });
}

      nextBtn.textContent = '🎓 Take Final Exam';
      nextBtn.className = 'nav-btn btn-quiz';
      nextBtn.onclick = () => window.location.href = `exam.html?cert=${certNumber}`;
    }
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nav-btn btn-next';
    nextBtn.onclick = nextSlide;
  }

  // Save progress
  scheduleSave();
}

// ── NAVIGATION ───────────────────────────────────────────────────
function nextSlide() {
  stopSpeech();
  const module = courseData.modules[currentModuleIndex];
  if (currentSlideIndex < module.slides.length - 1) {
    currentSlideIndex++;
    renderSlide();
  }
}

function prevSlide() {
  stopSpeech();
  if (currentSlideIndex > 0) {
    currentSlideIndex--;
  } else if (currentModuleIndex > 0) {
    currentModuleIndex--;
    currentSlideIndex = courseData.modules[currentModuleIndex].slides.length - 1;
    buildSidebar();
  }
  renderSlide();
}

function nextModule() {
  stopSpeech();
  currentModuleIndex++;
  currentSlideIndex = 0;
  buildSidebar();
  renderSlide();
}

function goToQuiz() {
  saveProgress();
  window.location.href = `quiz.html?cert=${certNumber}&module=${currentModuleIndex + 1}`;
}

// ── SAVE PROGRESS ────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveProgress, 1500);
}

async function saveProgress() {
  if (!userId) return;
  try {
    await sb.from('module_progress').upsert({
      user_id: userId,
      cert_number: certNumber,
      module_number: currentModuleIndex + 1,
      current_slide: currentSlideIndex,
      status: 'in_progress',
      last_accessed: new Date().toISOString()
    }, { onConflict: 'user_id,cert_number,module_number' });

    document.getElementById('autoSaveLabel').textContent = 'Progress saved';
    setTimeout(() => {
      const el = document.getElementById('autoSaveLabel');
      if (el) el.textContent = '';
    }, 2000);
  } catch (e) { console.error('Save error:', e); }
}

// ── READ ALOUD ───────────────────────────────────────────────────

// Preferred natural female voices in priority order
const PREFERRED_VOICES = [
  'Microsoft Jenny Online (Natural) - English (United States)',
  'Microsoft Aria Online (Natural) - English (United States)',
  'Microsoft Jenny - English (United States)',
  'Microsoft Zira - English (United States)',
  'Google US English',
  'Samantha',  // macOS/iOS natural voice
  'Karen',     // macOS Australian
  'Victoria',  // macOS
];

let selectedVoice = null;

function getBestVoice() {
  const voices = speechSynth.getVoices();
  for (const preferred of PREFERRED_VOICES) {
    const match = voices.find(v => v.name === preferred);
    if (match) return match;
  }
  // Fallback: first English female-sounding voice
  const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'));
  if (englishVoice) return englishVoice;
  // Final fallback: first English voice
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

// Load voices (Chrome loads them async)
if (speechSynth.onvoiceschanged !== undefined) {
  speechSynth.onvoiceschanged = () => { selectedVoice = getBestVoice(); };
}
setTimeout(() => { selectedVoice = getBestVoice(); }, 500);

function toggleReadAloud() {
  if (isSpeaking) { stopSpeech(); } else { startSpeech(); }
}

function startSpeech() {
  stopSpeech();
  if (!selectedVoice) selectedVoice = getBestVoice();

  const module = courseData.modules[currentModuleIndex];
  const slide = module.slides[currentSlideIndex];

  const tmp = document.createElement('div');
  tmp.innerHTML = `${slide.title}. ${slide.body}`;
  const text = tmp.textContent || tmp.innerText || '';

  const utterance = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utterance.voice = selectedVoice;
  utterance.rate = 0.92;
  utterance.pitch = 1.05;
  utterance.volume = 1;

  utterance.onend = () => {
    isSpeaking = false;
    document.getElementById('readAloudBtn').classList.remove('active');
    document.getElementById('readAloudBtn').textContent = '🔊 Read aloud';
  };
  utterance.onerror = () => {
    isSpeaking = false;
    document.getElementById('readAloudBtn').classList.remove('active');
    document.getElementById('readAloudBtn').textContent = '🔊 Read aloud';
  };

  speechSynth.speak(utterance);
  isSpeaking = true;
  document.getElementById('readAloudBtn').classList.add('active');
  document.getElementById('readAloudBtn').textContent = '⏹ Stop reading';
}

function stopSpeech() {
  speechSynth.cancel();
  isSpeaking = false;
  const btn = document.getElementById('readAloudBtn');
  if (btn) { btn.classList.remove('active'); btn.textContent = '🔊 Read aloud'; }
}

init();
</script>
