<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certification Viewer — MidAmerica Watershed.Org</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark: #085041; --green-mid: #0d6b56; --green-light: #e1f5ee;
    --gold: #c9a84c; --text: #1a1a18; --text-muted: #5a5a55;
    --border: #d4d4c8; --white: #fafaf7; --bg: #f4f4ef;
  }
  body { font-family: 'DM Sans', sans-serif; background: #1a1a18; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* TOP BAR */
  .top-bar { background: var(--green-dark); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .top-bar-left { display: flex; align-items: center; gap: 1rem; }
  .back-btn { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; }
  .back-btn:hover { color: #fff; }
  .viewer-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: rgba(255,255,255,0.9); }
  .top-bar-right { display: flex; align-items: center; gap: 0.75rem; }
  .read-aloud-btn { display: flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2); padding: 0.35rem 0.9rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
  .read-aloud-btn:hover { background: rgba(255,255,255,0.2); }
  .read-aloud-btn.active { background: var(--gold); color: var(--green-dark); border-color: var(--gold); }
  .slide-counter { font-size: 0.82rem; color: rgba(255,255,255,0.5); font-family: monospace; }

  /* LAYOUT */
  .viewer-body { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 220px; background: #111110; flex-shrink: 0; overflow-y: auto; padding: 1rem 0; }
  .sidebar-section-title { font-size: 0.68rem; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 1rem; margin-bottom: 0.4rem; margin-top: 1rem; }
  .sidebar-section-title:first-child { margin-top: 0; }
  .module-btn { display: flex; align-items: flex-start; gap: 0.6rem; width: 100%; padding: 0.6rem 1rem; background: none; border: none; color: rgba(255,255,255,0.5); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; text-align: left; cursor: pointer; transition: background 0.15s, color 0.15s; line-height: 1.3; }
  .module-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
  .module-btn.active { background: rgba(8,80,65,0.4); color: #fff; }
  .module-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .status-done { background: var(--gold); }
  .status-active { background: #4ade80; }
  .status-locked { background: rgba(255,255,255,0.2); }

  /* SLIDE AREA */
  .slide-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; overflow: hidden; }

  /* SLIDE WINDOW */
  .slide-window { background: #fff; border-radius: 10px; width: 100%; max-width: 900px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; position: relative; }

  /* SLIDE IMAGE */
  .slide-image-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #f0f0f0; }
  .slide-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
  .slide-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 0.75rem; color: var(--text-muted); }
  .spinner-sm { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green-dark); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SLIDE FOOTER */
  .slide-footer { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--white); }
  .slide-num { font-size: 0.78rem; color: var(--text-muted); }
  .module-progress { font-size: 0.78rem; color: var(--text-muted); }
  .progress-bar-mini { width: 120px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 3px; }
  .progress-fill-mini { height: 100%; background: var(--green-dark); border-radius: 99px; transition: width 0.3s; }
  .auto-save-label { font-size: 0.75rem; color: var(--green-dark); }

  /* NAV BUTTONS */
  .nav-buttons { display: flex; gap: 1.5rem; align-items: center; margin-top: 1.25rem; }
  .nav-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1.5rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: background 0.2s; }
  .btn-prev { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  .btn-prev:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next { background: var(--green-dark); color: #fff; }
  .btn-next:hover { background: var(--green-mid); }
  .btn-quiz { background: var(--gold); color: var(--green-dark); font-weight: 600; }
  .btn-quiz:hover { background: #b8962a; }

  /* LOADING SCREEN */
  .loading-screen { display: flex; align-items: center; justify-content: center; flex: 1; flex-direction: column; gap: 1rem; color: rgba(255,255,255,0.4); }
  .spinner-lg { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* QUIZ PROMPT */
  .quiz-prompt { background: var(--gold-light,#faf3e0); border: 1.5px solid var(--gold); border-radius: 8px; padding: 0.85rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; color: #5c420a; margin: 0 1.25rem 0.75rem; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .slide-area { padding: 1rem; }
  }
</style>
</head>

  <div class="top-bar-left">
    <a href="dashboard.html" class="back-btn">← Dashboard</a>

<script>
const SUPABASE_URL = 'https://wncnxgyupryvrqkycvzp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kotvXZUSlXTuorvZN5HdcA_eaLF6YvF';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CERT_TITLES = {
  1: 'Green Infrastructure Planning and Design',
  2: 'Green Infrastructure Installation and Construction',
  3: 'Green Infrastructure Maintenance and Management',
  4: 'Master of Green Infrastructure'
};

const CLOUDINARY_BASE = 'https://res.cloudinary.com/db1tgrb8g/image/upload';

// Course structures for all certifications
const COURSE_MODULES = {
  1: [
    { moduleNumber: 1, title: 'Green Infrastructure & LID Fundamentals', start: 1, end: 101 },
    { moduleNumber: 2, title: 'Unified GI/LID/BMP Understanding & Roles', start: 102, end: 129 },
    { moduleNumber: 3, title: 'Hydrology, Policy & Funding', start: 130, end: 209 },
    { moduleNumber: 4, title: 'GI/LID Synergy & Sustainable Urban Development', start: 210, end: 336 },
    { moduleNumber: 5, title: 'GI Networks, Project Planning & Regulatory Compliance', start: 337, end: 465 },
    { moduleNumber: 6, title: 'Adaptive Management, Water Management & BMP/LID Selection', start: 466, end: 601 },
    { moduleNumber: 7, title: 'Plants in BMPs and LID Systems', start: 602, end: 621 }
  ],
  2: [
    { moduleNumber: 1, title: 'Foundations of Green Infrastructure, LID, and BMP Terminology', start: 1, end: 36 },
    { moduleNumber: 2, title: 'Legal Responsibilities, Documentation and Permitting', start: 37, end: 109 },
    { moduleNumber: 3, title: 'Site Preparation, Testing, Soils and Excavation', start: 110, end: 194 },
    { moduleNumber: 4, title: 'Construction of LID BMPs', start: 195, end: 262 },
    { moduleNumber: 5, title: 'Sequencing, Logistics, Quality Control and Avoiding Failure', start: 263, end: 295 },
    { moduleNumber: 6, title: 'Retrofitting Green Infrastructure Into Existing Systems', start: 296, end: 316 },
    { moduleNumber: 7, title: 'Post Construction', start: 317, end: 328 },
    { moduleNumber: 8, title: 'Certifying Green Infrastructure Projects and Installations', start: 329, end: 335 }
  ],
  3: [
    { moduleNumber: 1, title: 'Importance of Inspection and Maintenance', start: 1, end: 30 },
    { moduleNumber: 2, title: 'Routine and Advanced Maintenance', start: 31, end: 217 },
    { moduleNumber: 3, title: 'Troubleshooting and Repairs', start: 218, end: 253 },
    { moduleNumber: 4, title: 'Inspection Tools and Lifecycle Planning', start: 254, end: 314 },
    { moduleNumber: 5, title: 'Policy, Compliance, and Funding', start: 315, end: 370 },
    { moduleNumber: 6, title: 'Future Innovations and Climate Adaptation', start: 371, end: 396 }
  ],
  4: [
    { moduleNumber: 1, title: 'Ecological Systems and Landscape Architecture Theory', start: 1, end: 20 },
    { moduleNumber: 2, title: 'Watershed Planning and Regional Scale Design', start: 21, end: 32 },
    { moduleNumber: 3, title: 'Advanced Site Design and Materials Science', start: 33, end: 46 },
    { moduleNumber: 4, title: 'Planting Ecology and Habitat Design', start: 47, end: 61 },
    { moduleNumber: 5, title: 'Performance Evaluation and Monitoring', start: 62, end: 77 },
    { moduleNumber: 6, title: 'Professional Leadership and Policy', start: 78, end: 116 }
  ]
};

// All slide text for read-aloud (loaded from JSON)
let slideTexts = {};
let userId = null;
let certNumber = null;
let currentModuleIndex = 0;
let currentSlideInModule = 0;
let moduleProgressData = [];
let isSpeaking = false;
let speechSynth = window.speechSynthesis;
let saveTimeout = null;
let selectedVoice = null;
let courseData = [];

// Load slide texts for the correct cert
async function loadSlideTexts() {
  try {
    const res = await fetch(`cert${certNumber}_text.json`);
    if (res.ok) slideTexts = await res.json();
  } catch(e) { console.log('Slide texts not loaded'); }
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;

  const params = new URLSearchParams(window.location.search);
  certNumber = parseInt(params.get('cert')) || 1;
  const moduleParam = parseInt(params.get('module')) || null;

  document.getElementById('viewerTitle').textContent = CERT_TITLES[certNumber];

  // Set course data for this cert
  courseData = COURSE_MODULES[certNumber] || COURSE_MODULES[1];

  // Check enrollment
  const { data: enrollment } = await sb.from('cert_enrollments')
    .select('*').eq('user_id', userId).eq('cert_number', certNumber).single();
  if (!enrollment) { window.location.href = 'dashboard.html'; return; }

  // Load module progress
  const { data: mp } = await sb.from('module_progress')
    .select('*').eq('user_id', userId).eq('cert_number', certNumber);
  moduleProgressData = mp || [];

  // Load slide texts for read-aloud
  await loadSlideTexts();

  // Determine starting position
  if (moduleParam !== null) {
    currentModuleIndex = moduleParam - 1;
    currentSlideInModule = 0;
  } else {
    const savedModule = moduleProgressData.find(m => m.status === 'in_progress');
    if (savedModule) {
      currentModuleIndex = savedModule.module_number - 1;
      currentSlideInModule = savedModule.current_slide || 0;
    } else {
      let found = false;
      for (let i = 0; i < courseData.length; i++) {
        const mp = moduleProgressData.find(m => m.module_number === i + 1);
        if (!mp || !mp.quiz_passed) { currentModuleIndex = i; found = true; break; }
      }
      if (!found) currentModuleIndex = 0;
      currentSlideInModule = 0;
    }
  }

  // Setup voice
  if (speechSynth.onvoiceschanged !== undefined) {
    speechSynth.onvoiceschanged = () => { selectedVoice = getBestVoice(); };
  }
  setTimeout(() => { selectedVoice = getBestVoice(); }, 500);

  buildSidebar();
  renderSlide();

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('viewerContent').style.display = 'flex';
}

function getModule() { return courseData[currentModuleIndex]; }

function getAbsoluteSlideNumber() {
  const mod = getModule();
  return mod.start + currentSlideInModule;
}

function getSlidesInModule() {
  const mod = getModule();
  return mod.end - mod.start + 1;
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  courseData.forEach((mod, i) => {
    const mp = moduleProgressData.find(m => m.module_number === i + 1);
    const isDone = mp?.quiz_passed;
    const isActive = i === currentModuleIndex;

    const label = document.createElement('div');
    label.className = 'sidebar-section-title';
    label.textContent = `Module ${i + 1}`;
    sidebar.appendChild(label);

    const btn = document.createElement('button');
    btn.className = `module-btn${isActive ? ' active' : ''}`;
    const dotClass = isDone ? 'status-done' : isActive ? 'status-active' : 'status-locked';
    btn.innerHTML = `<div class="module-status ${dotClass}"></div>${mod.title}`;
    btn.onclick = () => { currentModuleIndex = i; currentSlideInModule = 0; buildSidebar(); renderSlide(); };
    sidebar.appendChild(btn);
  });
}

function renderSlide() {
  stopSpeech();
  const mod = getModule();
  const slideNum = getAbsoluteSlideNumber();
  const totalInModule = getSlidesInModule();
  const isLast = currentSlideInModule === totalInModule - 1;
  const mp = moduleProgressData.find(m => m.module_number === currentModuleIndex + 1);
  const quizPassed = mp?.quiz_passed;

  // Update counters
  const totalSlides = courseData.reduce((sum, m) => sum + (m.end - m.start + 1), 0);
  document.getElementById('slideCounter').textContent = `${slideNum} / ${totalSlides}`;
  document.getElementById('slideNum').textContent = `Slide ${slideNum} · Module ${currentModuleIndex + 1} of ${courseData.length}`;
  document.getElementById('moduleProgress').textContent = `${currentSlideInModule + 1} of ${totalInModule} in this module`;
  document.getElementById('progressFillMini').style.width = `${((currentSlideInModule + 1) / totalInModule) * 100}%`;

  // Load image
  const img = document.getElementById('slideImg');
  const loader = document.getElementById('slideLoading');
  img.style.display = 'none';
  loader.style.display = 'flex';
  // Build correct Cloudinary URL - folder not needed in URL
  let imgUrl;
  if (certNumber === 1) {
    imgUrl = `https://res.cloudinary.com/db1tgrb8g/image/upload/Slide${slideNum}.jpg`;
  } else if (certNumber === 2) {
    imgUrl = `https://res.cloudinary.com/db1tgrb8g/image/upload/S${slideNum}.jpg`;
  } else if (certNumber === 3) {
    imgUrl = `https://res.cloudinary.com/db1tgrb8g/image/upload/C3_${slideNum}.jpg`;
  } else if (certNumber === 4) {
    imgUrl = `https://res.cloudinary.com/db1tgrb8g/image/upload/C4_${slideNum}.jpg`;
  }
  img.src = imgUrl;

  // Quiz prompt
  const quizArea = document.getElementById('quizPromptArea');
  if (isLast && !quizPassed) {
    quizArea.innerHTML = `<div class="quiz-prompt">📝 <span><strong>Module complete — quiz required.</strong> You must score 80% or higher to unlock the next module.</span></div>`;
  } else {
    quizArea.innerHTML = '';
  }

  // Nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentSlideInModule === 0 && currentModuleIndex === 0;

  if (isLast && !quizPassed) {
    nextBtn.textContent = '📝 Take Module Quiz';
    nextBtn.className = 'nav-btn btn-quiz';
    nextBtn.onclick = goToQuiz;
  } else if (isLast && quizPassed && currentModuleIndex < courseData.length - 1) {
    nextBtn.textContent = 'Next Module →';
    nextBtn.className = 'nav-btn btn-next';
    nextBtn.onclick = nextModule;
  } else if (isLast && quizPassed && currentModuleIndex === courseData.length - 1) {
    nextBtn.textContent = '🎓 Take Final Exam';
    nextBtn.className = 'nav-btn btn-quiz';
    nextBtn.onclick = () => window.location.href = `exam.html?cert=${certNumber}`;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nav-btn btn-next';
    nextBtn.onclick = nextSlide;
  }

  scheduleSave();
}

function onImageLoad() {
  document.getElementById('slideImg').style.display = 'block';
  document.getElementById('slideLoading').style.display = 'none';
}

function onImageError() {
  document.getElementById('slideLoading').innerHTML = '<div style="font-size:0.85rem;color:#888">Slide image not found</div>';
}

function nextSlide() {
  stopSpeech();
  const totalInModule = getSlidesInModule();
  if (currentSlideInModule < totalInModule - 1) {
    currentSlideInModule++;
    renderSlide();
  }
}

function prevSlide() {
  stopSpeech();
  if (currentSlideInModule > 0) {
    currentSlideInModule--;
  } else if (currentModuleIndex > 0) {
    currentModuleIndex--;
    currentSlideInModule = getSlidesInModule() - 1;
    buildSidebar();
  }
  renderSlide();
}

function nextModule() {
  stopSpeech();
  currentModuleIndex++;
  currentSlideInModule = 0;
  buildSidebar();
  renderSlide();
}

function goToQuiz() {
  saveProgress();
  window.location.href = `quiz.html?cert=${certNumber}&module=${currentModuleIndex + 1}`;
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveProgress, 1500);
}

async function saveProgress() {
  if (!userId) return;
  try {
    await sb.from('module_progress').upsert({
      user_id: userId, cert_number: certNumber,
      module_number: currentModuleIndex + 1,
      current_slide: currentSlideInModule,
      status: 'in_progress',
      last_accessed: new Date().toISOString()
    }, { onConflict: 'user_id,cert_number,module_number' });
    document.getElementById('autoSaveLabel').textContent = '✓ Saved';
    setTimeout(() => { const el = document.getElementById('autoSaveLabel'); if (el) el.textContent = ''; }, 2000);
  } catch(e) { console.error('Save error:', e); }
}

// READ ALOUD
const PREFERRED_VOICES = [
  'Microsoft Jenny Online (Natural) - English (United States)',
  'Microsoft Aria Online (Natural) - English (United States)',
  'Microsoft Jenny - English (United States)',
  'Microsoft Zira - English (United States)',
  'Google US English', 'Samantha', 'Karen', 'Victoria'
];

function getBestVoice() {
  const voices = speechSynth.getVoices();
  for (const preferred of PREFERRED_VOICES) {
    const match = voices.find(v => v.name === preferred);
    if (match) return match;
  }
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

function toggleReadAloud() {
  if (isSpeaking) { stopSpeech(); } else { startSpeech(); }
}

function startSpeech() {
  stopSpeech();
  if (!selectedVoice) selectedVoice = getBestVoice();
  const slideNum = getAbsoluteSlideNumber();
  const text = slideTexts[slideNum] || slideTexts[String(slideNum)] || `Slide ${slideNum}`;
  const utterance = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utterance.voice = selectedVoice;
  utterance.rate = 0.92; utterance.pitch = 1.05;
  utterance.onend = () => { isSpeaking = false; updateReadAloudBtn(false); };
  utterance.onerror = () => { isSpeaking = false; updateReadAloudBtn(false); };
  speechSynth.speak(utterance);
  isSpeaking = true;
  updateReadAloudBtn(true);
}

function stopSpeech() {
  speechSynth.cancel();
  isSpeaking = false;
  updateReadAloudBtn(false);
}

function updateReadAloudBtn(active) {
  const btn = document.getElementById('readAloudBtn');
  if (!btn) return;
  btn.classList.toggle('active', active);
  btn.textContent = active ? '⏹ Stop reading' : '🔊 Read aloud';
}

init();
</script>
