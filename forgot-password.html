<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — MidAmerica Watershed.Org</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark: #085041; --green-mid: #0d6b56; --green-light: #e1f5ee;
    --gold: #c9a84c; --text: #1a1a18; --text-muted: #5a5a55;
    --border: #d4d4c8; --white: #fafaf7; --bg: #f4f4ef;
    --error: #c0392b; --error-light: #fdf0ef;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .panel { background: #fff; border-radius: 16px; border: 1.5px solid var(--border); padding: 2.5rem; width: 100%; max-width: 420px; }

  .logo-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; text-decoration: none; }
  .logo-mark { width: 44px; height: 44px; overflow: hidden; border-radius: 10px; flex-shrink: 0; }
  .logo-mark img { width: 100%; height: 100%; object-fit: contain; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--text); line-height: 1.25; }

  h1 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; margin-bottom: 0.5rem; }
  .subtitle { font-size: 0.92rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }

  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; color: var(--text); }
  input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); background: #fff; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--green-dark); box-shadow: 0 0 0 3px rgba(8,80,65,0.08); }

  .submit-btn { width: 100%; padding: 0.85rem; background: var(--green-dark); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .submit-btn:hover { background: var(--green-mid); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .alert { border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.25rem; display: none; }
  .alert.show { display: block; }
  .alert-error { background: var(--error-light); border: 1.5px solid #f5c6c2; color: var(--error); }
  .alert-success { background: var(--green-light); border: 1.5px solid rgba(8,80,65,0.2); color: var(--green-dark); }

  .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); text-decoration: none; }
  .back-link:hover { color: var(--green-dark); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
</style>
</head>
<body>

<div class="panel">
  <a href="login.html" class="logo-wrap">
    <div class="logo-mark"><img src="logo.gif" alt="MAWA Logo"></div>
    <div class="logo-text">MidAmerica<br>Watershed.Org</div>
  </a>

  <!-- STEP 1: Request reset email -->
  <div id="requestStep">
    <h1>Forgot password?</h1>
    <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

    <div class="alert alert-error" id="requestError"></div>
    <div class="alert alert-success" id="requestSuccess"></div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>

    <button class="submit-btn" id="requestBtn" onclick="requestReset()">Send reset link</button>
    <a href="login.html" class="back-link">← Back to sign in</a>
  </div>

  <!-- STEP 2: Set new password (shown after clicking email link) -->
  <div id="resetStep" style="display:none;">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password for your account.</p>

    <div class="alert alert-error" id="resetError"></div>
    <div class="alert alert-success" id="resetSuccess"></div>

    <div class="form-group">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" required>
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your new password" required>
    </div>

    <button class="submit-btn" id="resetBtn" onclick="setNewPassword()">Update password</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wncnxgyupryvrqkycvzp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kotvXZUSlXTuorvZN5HdcA_eaLF6YvF';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check if this is a password reset callback (has access_token in URL)
async function init() {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);
  
  // Supabase sends recovery token as hash fragment
  if (hash.includes('type=recovery') || params.get('type') === 'recovery') {
    document.getElementById('requestStep').style.display = 'none';
    document.getElementById('resetStep').style.display = 'block';
  }
}

async function requestReset() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('requestBtn');
  const errorEl = document.getElementById('requestError');
  const successEl = document.getElementById('requestSuccess');

  errorEl.classList.remove('show');
  successEl.classList.remove('show');

  if (!email) {
    errorEl.textContent = 'Please enter your email address.';
    errorEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/forgot-password.html`
    });

    if (error) throw error;

    successEl.textContent = '✓ Reset link sent! Check your email inbox (and spam folder) for a link to reset your password. The link expires in 1 hour.';
    successEl.classList.add('show');
    document.getElementById('email').value = '';
    btn.textContent = 'Link sent';

  } catch (err) {
    errorEl.textContent = err.message || 'Something went wrong. Please try again.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

async function setNewPassword() {
  const newPass = document.getElementById('newPassword').value;
  const confirmPass = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('resetBtn');
  const errorEl = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');

  errorEl.classList.remove('show');
  successEl.classList.remove('show');

  if (!newPass || newPass.length < 8) {
    errorEl.textContent = 'Password must be at least 8 characters.';
    errorEl.classList.add('show');
    return;
  }

  if (newPass !== confirmPass) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) throw error;

    successEl.textContent = '✓ Password updated successfully! Redirecting you to sign in...';
    successEl.classList.add('show');

    setTimeout(() => { window.location.href = 'login.html'; }, 2500);

  } catch (err) {
    errorEl.textContent = err.message || 'Something went wrong. Please try again.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('resetStep').style.display !== 'none') {
      setNewPassword();
    } else {
      requestReset();
    }
  }
});

init();
</script>
</body>
</html>
