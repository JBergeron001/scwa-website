<style>

  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--green-dark); padding: 0 2rem; height: 56px;

    position: sticky; top: 0; z-index: 100;

  .nav-left { display: flex; align-items: center; gap: 1rem; }
  .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
  .nav-logo-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--green-dark); }
  .nav-title { font-family: 'DM Serif Display', serif; font-size: 0.95rem; color: rgba(255,255,255,0.9); }
  .nav-badge { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 99px; }

  main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* QUIZ HEADER */
  .quiz-header { margin-bottom: 2rem; }
  .quiz-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .quiz-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 0.75rem; }
  .quiz-meta { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

  .quiz-rules {
    background: var(--green-light);

    margin-bottom: 2rem;
    font-size: 0.88rem;

    background: #fff;

    margin-bottom: 1.25rem;

  .q-number { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; }
  .q-text { font-size: 1.05rem; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.5; }

  .options { display: flex; flex-direction: column; gap: 0.6rem; }

  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 0.95rem;
    line-height: 1.4;
  }
  .option-label:hover { border-color: var(--green-dark); background: var(--green-light); }
  .option-label input[type="radio"] { margin-top: 2px; flex-shrink: 0; accent-color: var(--green-dark); }
  .option-label.selected { border-color: var(--green-dark); background: var(--green-light); }
  .option-label.correct { border-color: #27ae60; background: #eafaf1; }
  .option-label.incorrect { border-color: var(--error); background: var(--error-light); }

  /* SUBMIT */
  .submit-area { margin-top: 2rem; }
  .submit-btn {
    width: 100%; padding: 1rem; background: var(--green-dark); color: #fff;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
    margin-bottom: 0.75rem;
  }
  .submit-btn:hover { background: var(--green-mid); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-note { font-size: 0.82rem; color: var(--text-muted); text-align: center; }

  .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  .submit-btn.loading .btn-text { display: none; }
  .submit-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-screen { display: none; text-align: center; padding: 3rem 2rem; background: #fff; border-radius: 16px; border: 1.5px solid var(--border); }
  .result-screen.show { display: block; }
  .result-icon { font-size: 3.5rem; margin-bottom: 1rem; }
  .result-title { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
  .result-score { font-size: 3.5rem; font-weight: 600; margin: 1rem 0; }
  .score-pass { color: var(--green-dark); }
  .score-fail { color: var(--error); }
  .result-desc { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; max-width: 480px; margin-left: auto; margin-right: auto; }
  .result-btn { display: inline-block; padding: 0.8rem 2rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.95rem; text-decoration: none; cursor: pointer; border: none; margin: 0.4rem; }

  .btn-green:hover { background: var(--green-mid); }
  .btn-gold { background: var(--gold); color: var(--green-dark); font-weight: 600; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }

</style>

let userId = null;
let certNumber = null;
let moduleNumber = null;
let quizData = null;
let userAnswers = {};
let submitted = false;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;

  const params = new URLSearchParams(window.location.search);
  certNumber = parseInt(params.get('cert')) || 1;
  moduleNumber = parseInt(params.get('module')) || 1;

  const key = `${certNumber}-${moduleNumber}`;
  quizData = SAMPLE_QUIZZES[key] || SAMPLE_QUIZZES['1-1'];

  document.getElementById('navTitle').textContent = CERT_TITLES[certNumber];
  document.getElementById('navBadge').textContent = `Module ${moduleNumber} Quiz`;
  document.getElementById('quizLabel').textContent = `Certification ${certNumber} — Module ${moduleNumber}`;
  document.getElementById('quizTitle').textContent = quizData.title + ' — Quiz';
  document.getElementById('quizMeta').textContent = `${quizData.questions.length} questions · Pass with 80% or higher · Unlimited attempts (module restart required on fail)`;

  renderQuestions();

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('quizContent').style.display = 'block';
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  quizData.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';

    let optionsHtml = q.options.map((opt, oi) => `
      <label class="option-label" id="opt-${qi}-${oi}">
        <input type="radio" name="q${qi}" value="${oi}" onchange="selectAnswer(${qi}, ${oi})">
        ${opt}
      </label>`).join('');

    card.innerHTML = `
      <div class="q-number">Question ${qi + 1} of ${quizData.questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>`;

    container.appendChild(card);
  });

  updateSubmitNote();
}

function selectAnswer(qi, oi) {
  userAnswers[qi] = oi;
  // Highlight selected
  quizData.questions[qi].options.forEach((_, i) => {
    const lbl = document.getElementById(`opt-${qi}-${i}`);
    if (lbl) lbl.classList.toggle('selected', i === oi);
  });
  updateSubmitNote();
}

function updateSubmitNote() {
  const answered = Object.keys(userAnswers).length;
  const total = quizData.questions.length;
  const note = document.getElementById('submitNote');
  const btn = document.getElementById('submitBtn');

  if (answered < total) {
    note.textContent = `${answered} of ${total} questions answered. Answer all to submit.`;
    btn.disabled = true;
  } else {
    note.textContent = 'All questions answered. Ready to submit!';
    btn.disabled = false;
  }
}

async function submitQuiz() {
  if (submitted) return;
  submitted = true;

  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  // Score
  let correct = 0;
  quizData.questions.forEach((q, qi) => {
    if (userAnswers[qi] === q.answer) correct++;
  });

  const score = Math.round((correct / quizData.questions.length) * 100);
  const passed = score >= 80;

  // Save to Supabase
  try {
    const { data: existing } = await sb.from('module_progress')
      .select('quiz_attempts').eq('user_id', userId)
      .eq('cert_number', certNumber).eq('module_number', moduleNumber).single();

    const attempts = (existing?.quiz_attempts || 0) + 1;

    await sb.from('module_progress').upsert({
      user_id: userId,
      cert_number: certNumber,
      module_number: moduleNumber,
      quiz_passed: passed,
      quiz_score: score,
      quiz_attempts: attempts,
      status: passed ? 'passed' : 'in_progress',
      quiz_passed_date: passed ? new Date().toISOString() : null,
      current_slide: passed ? undefined : 0,
      last_accessed: new Date().toISOString()
    }, { onConflict: 'user_id,cert_number,module_number' });

  } catch (e) { console.error('Save error:', e); }

  showResults(score, passed, correct);
}

function showResults(score, passed, correct) {
  document.getElementById('quizContent').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.classList.add('show');

  document.getElementById('resultIcon').textContent = passed ? '🎉' : '📚';
  document.getElementById('resultTitle').textContent = passed ? 'Quiz Passed!' : 'Not quite — let\'s review';
  document.getElementById('resultScore').innerHTML = `<span class="${passed ? 'score-pass' : 'score-fail'}">${score}%</span>`;

  const total = quizData.questions.length;

  if (passed) {
    document.getElementById('resultDesc').textContent = `You answered ${correct} out of ${total} questions correctly. Well done! You've unlocked the next module.`;
    document.getElementById('resultActions').innerHTML = `
      <a href="viewer.html?cert=${certNumber}&module=${moduleNumber + 1}" class="result-btn btn-green">Continue to next module →</a>
      <a href="dashboard.html" class="result-btn btn-outline">Back to dashboard</a>`;
  } else {
    document.getElementById('resultDesc').textContent = `You answered ${correct} out of ${total} questions correctly — ${score}% (need 80% to pass). You'll need to review the module slides and retake the quiz. Your progress for this module has been reset.`;
    document.getElementById('resultActions').innerHTML = `
      <a href="viewer.html?cert=${certNumber}&module=${moduleNumber}" class="result-btn btn-gold">Review module slides →</a>
      <a href="dashboard.html" class="result-btn btn-outline">Back to dashboard</a>`;
  }
}

init();
</script>

</body>
</html>
